<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Timetable Resolver</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        h1 {
            text-align: center;
            font-weight: 800;
            font-size: 3rem;
            margin-bottom: 10px;
            background: -webkit-linear-gradient(45deg, #00C9FF 0%, #92FE9D 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 15px rgba(0, 201, 255, 0.3);
        }

        p.subtitle {
            text-align: center;
            color: #b0c4de;
            margin-bottom: 40px;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 30px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px 0 rgba(0, 0, 0, 0.5);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .file-upload {
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-upload:hover {
            border-color: #00C9FF;
            background: rgba(0, 201, 255, 0.05);
        }

        .file-upload input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
            color: #fff;
        }

        .file-upload p {
            color: #8892b0;
            font-size: 0.9rem;
        }
        
        .file-name {
            display: block;
            margin-top: 10px;
            color: #92FE9D;
            font-weight: 600;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #00C9FF 0%, #92FE9D 100%);
            color: #1a1a2e;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: filter 0.3s, transform 0.2s;
            margin-top: 20px;
            box-shadow: 0px 4px 15px rgba(0, 201, 255, 0.4);
        }

        .submit-btn:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }
        
        .submit-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            filter: none;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #00C9FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .results {
            display: none;
            animation: fadeIn 0.8s ease forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .form-grid, .results-grid {
                grid-template-columns: 1fr;
            }
        }

        .graph-preview {
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.4);
            object-fit: contain;
        }

        .table-container {
            max-height: 500px;
            overflow-y: auto;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
        }

        th, td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        th {
            background: rgba(0, 201, 255, 0.1);
            color: #00C9FF;
            position: sticky;
            top: 0;
            backdrop-filter: blur(10px);
            font-weight: 600;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }
        
        .badge {
            background: rgba(146, 254, 157, 0.2);
            color: #92FE9D;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>Algorithm Visualizer</h1>
    <p class="subtitle">Resolve University Exam Conflicts via Graph Coloring</p>

    <div class="glass-card">
        <form id="uploadForm">
            <div class="form-grid">
                <div class="file-upload">
                    <input type="file" id="coursesFile" accept=".csv" required onchange="document.getElementById('c-name').innerText = this.files[0].name">
                    <h3>Courses Data</h3>
                    <p>Upload courses CSV</p>
                    <span class="file-name" id="c-name"></span>
                </div>
                <div class="file-upload">
                    <input type="file" id="studentsFile" accept=".csv" required onchange="document.getElementById('s-name').innerText = this.files[0].name">
                    <h3>Student Enrollments</h3>
                    <p>Upload students CSV</p>
                    <span class="file-name" id="s-name"></span>
                </div>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Generate Optimal Timetable</button>
        </form>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: #00C9FF;">Calculating Graph Coordinates...</p>
    </div>

    <div class="results" id="resultsBlock">
        <h2 style="margin-bottom: 20px; text-align: center; color: #92FE9D;">Optimization Complete!</h2>
        
        <div class="results-grid">
            <div class="glass-card" style="margin-bottom: 0;">
                <h3 style="margin-bottom: 15px; color: #00C9FF;">Conflict Graph Visualization</h3>
                <img id="graphOutput" class="graph-preview" src="" alt="Networkx Graph" />
            </div>

            <div class="glass-card" style="margin-bottom: 0; padding: 0; overflow: hidden;">
                <h3 style="margin: 20px 20px 15px 20px; color: #00C9FF;">Generated Schedule</h3>
                <div class="table-container">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th>Time Slot</th>
                                <th>Course ID</th>
                                <th>Course Name</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Dynamic Rows -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const coursesFile = document.getElementById('coursesFile').files[0];
        const studentsFile = document.getElementById('studentsFile').files[0];
        
        if (!coursesFile || !studentsFile) {
            alert("Please upload both CSV files.");
            return;
        }

        const formData = new FormData();
        formData.append('courses', coursesFile);
        formData.append('students', studentsFile);

        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const results = document.getElementById('resultsBlock');
        
        btn.disabled = true;
        btn.innerText = "Processing...";
        results.style.display = 'none';
        loader.style.display = 'block';

        try {
            const res = await fetch('/api/generate-timetable', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            
            if (res.ok) {
                // Populate image
                document.getElementById('graphOutput').src = data.imageUrl;
                
                // Populate table
                const tbody = document.querySelector('#dataTable tbody');
                tbody.innerHTML = '';
                
                data.timetable.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><span class="badge">${row['Time Slot']}</span></td>
                        <td style="font-weight: bold;">${row['Course ID']}</td>
                        <td style="color: #b0c4de;">${row['Course Name']}</td>
                    `;
                    tbody.appendChild(tr);
                });

                results.style.display = 'block';
            } else {
                alert("Error: " + (data.error || "Failed to generate"));
                console.error(data.details);
            }
        } catch (err) {
            console.error(err);
            alert("Network error occurred.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Generate Optimal Timetable";
            loader.style.display = 'none';
        }
    });
</script>
</body>
</html>
